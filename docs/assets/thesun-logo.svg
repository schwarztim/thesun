<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7C59F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rayGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#sunGradient)" stroke-width="2" opacity="0.3" filter="url(#glow)"/>

  <!-- Sun rays -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <!-- 12 rays around the sun -->
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(30)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(60)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(90)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(120)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(150)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(180)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(210)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(240)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(270)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(300)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="url(#rayGradient)" stroke-width="4" stroke-linecap="round" transform="rotate(330)"/>
  </g>

  <!-- Main sun circle -->
  <circle cx="100" cy="100" r="45" fill="url(#sunGradient)" filter="url(#glow)"/>

  <!-- Inner highlight -->
  <circle cx="90" cy="90" r="20" fill="white" opacity="0.2"/>

  <!-- MCP symbol (stylized network nodes) -->
  <g transform="translate(100, 100)">
    <!-- Center node -->
    <circle cx="0" cy="0" r="8" fill="#1a1a2e"/>
    <!-- Connected nodes -->
    <circle cx="-18" cy="-12" r="5" fill="#1a1a2e"/>
    <circle cx="18" cy="-12" r="5" fill="#1a1a2e"/>
    <circle cx="0" cy="18" r="5" fill="#1a1a2e"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-18" y2="-12" stroke="#1a1a2e" stroke-width="2"/>
    <line x1="0" y1="0" x2="18" y2="-12" stroke="#1a1a2e" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="18" stroke="#1a1a2e" stroke-width="2"/>
  </g>
</svg>
